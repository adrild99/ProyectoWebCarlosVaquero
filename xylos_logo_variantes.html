
<style>
  .wrap { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5px; background: var(--color-border-tertiary); }
  .cell { padding: 38px 20px; display: flex; flex-direction: column; align-items: center; gap: 13px; }
  .on-dark  { background: #0E1117; }
  .on-cream { background: #F7F3ED; }
  .on-slate { background: #1E2330; }
  .tag { font-size: 10px; font-weight: 500; letter-spacing: .07em; padding: 3px 9px; border-radius: 10px; display: inline-block; }
  .td { color: #8a6a30; border: 0.5px solid #3a2a15; }
  .tl { color: #7a6a55; border: 0.5px solid #b8a480; }
  .fnote { padding: 10px 16px; font-size: 11px; color: var(--color-text-secondary); line-height: 1.65; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
</style>

<svg width="0" height="0" style="position:absolute;overflow:hidden;pointer-events:none">
  <defs>
    <symbol id="xi" viewBox="0 0 210 58" overflow="visible">
      <!-- Pine tree -->
      <polygon points="21,2 10,19 32,19" style="fill:var(--lc,#C49240)"/>
      <polygon points="21,10 5,31 37,31" style="fill:var(--lc,#C49240)"/>
      <polygon points="21,18 0,44 42,44" style="fill:var(--lc,#C49240)"/>
      <rect x="17" y="44" width="8" height="8" style="fill:var(--lc,#C49240)"/>
      <!-- Main house roof -->
      <rect x="55" y="8" width="90" height="7" rx="1" style="fill:var(--lc,#C49240)"/>
      <!-- Main house body -->
      <rect x="59" y="15" width="82" height="37" style="fill:var(--lc,#C49240)"/>
      <!-- Windows 3x2 -->
      <rect x="63" y="20" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <rect x="82" y="20" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <rect x="101" y="20" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <rect x="63" y="34" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <rect x="82" y="34" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <rect x="101" y="34" width="15" height="11" style="fill:var(--wc,#0E1117)"/>
      <!-- Extension roof -->
      <rect x="139" y="19" width="62" height="7" rx="1" style="fill:var(--lc,#C49240)"/>
      <!-- Extension body -->
      <rect x="141" y="26" width="58" height="26" style="fill:var(--lc,#C49240)"/>
      <!-- Extension windows wide -->
      <rect x="144" y="31" width="22" height="16" style="fill:var(--wc,#0E1117)"/>
      <rect x="171" y="31" width="22" height="16" style="fill:var(--wc,#0E1117)"/>
      <!-- Ground line -->
      <line x1="0" y1="53" x2="210" y2="53" stroke-width="1.2" fill="none" style="stroke:var(--lc,#C49240)"/>
    </symbol>
  </defs>
</svg>

<div class="wrap">
  <div class="grid">

    <!-- 1. Principal — fondo oscuro, bronce -->
    <div class="cell on-dark">
      <svg viewBox="0 0 230 162" width="205" style="--lc:#C49240;--wc:#0E1117">
        <use href="#xi" style="--lc:#C49240;--wc:#0E1117" x="10" y="5" width="210" height="58"/>
        <text x="115" y="102" text-anchor="middle" font-family="var(--font-serif)" font-size="50" font-weight="400" fill="#C49240">Xylos</text>
        <line x1="34" y1="120" x2="74" y2="120" stroke="#C49240" stroke-width="0.8"/>
        <text x="115" y="124" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="300" fill="#C49240" letter-spacing="0.2em">home</text>
        <line x1="156" y1="120" x2="196" y2="120" stroke="#C49240" stroke-width="0.8"/>
        <text x="115" y="147" text-anchor="middle" font-family="var(--font-sans)" font-size="8" fill="#C49240" letter-spacing="0.05em" opacity="0.6">CREAMOS ESPACIOS, CONSTRUIMOS VIDAS</text>
      </svg>
      <span class="tag td">Principal · Fondo oscuro</span>
    </div>

    <!-- 2. Positivo — fondo crema -->
    <div class="cell on-cream">
      <svg viewBox="0 0 230 162" width="205" style="--lc:#0E1117;--wc:#F7F3ED">
        <use href="#xi" style="--lc:#0E1117;--wc:#F7F3ED" x="10" y="5" width="210" height="58"/>
        <text x="115" y="102" text-anchor="middle" font-family="var(--font-serif)" font-size="50" font-weight="400" fill="#C49240">Xylos</text>
        <line x1="34" y1="120" x2="74" y2="120" stroke="#C49240" stroke-width="0.8"/>
        <text x="115" y="124" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="300" fill="#0E1117" letter-spacing="0.2em">home</text>
        <line x1="156" y1="120" x2="196" y2="120" stroke="#C49240" stroke-width="0.8"/>
        <text x="115" y="147" text-anchor="middle" font-family="var(--font-sans)" font-size="8" fill="#6B6560" letter-spacing="0.05em">CREAMOS ESPACIOS, CONSTRUIMOS VIDAS</text>
      </svg>
      <span class="tag tl">Positivo · Fondo claro</span>
    </div>

    <!-- 3. Isotipo solo -->
    <div class="cell on-slate">
      <svg viewBox="0 0 210 58" width="195" style="--lc:#C49240;--wc:#1E2330">
        <use href="#xi" style="--lc:#C49240;--wc:#1E2330" x="0" y="0" width="210" height="58"/>
      </svg>
      <span class="tag td">Isotipo · Favicon / App icon</span>
    </div>

    <!-- 4. Compacto horizontal — navbar -->
    <div class="cell on-dark">
      <svg viewBox="0 0 244 46" width="210" style="--lc:#C49240;--wc:#0E1117">
        <g transform="translate(0,4) scale(0.63)">
          <use href="#xi" style="--lc:#C49240;--wc:#0E1117" x="0" y="0" width="210" height="58"/>
        </g>
        <line x1="138" y1="9" x2="138" y2="37" stroke="#C49240" stroke-width="0.5" opacity="0.35"/>
        <text x="149" y="26" font-family="var(--font-serif)" font-size="24" font-weight="400" fill="#C49240">Xylos</text>
        <text x="150" y="39" font-family="var(--font-sans)" font-size="9.5" font-weight="300" fill="#C49240" letter-spacing="0.22em" opacity="0.8">home</text>
      </svg>
      <span class="tag td">Compacto · Navbar / Header</span>
    </div>

  </div>
  <div class="fnote">
    Vista previa con tipografía del sistema. En la web: Cormorant Garamond para "Xylos" y Montserrat para "home" y el eslogan, tal como define la guía de identidad.
  </div>
</div>
